# Add this file to your catalog-api fork at:
#   .github/workflows/docker-publish.yml
#
# Also add Dockerfile.catalog (from this module folder) to the root of your fork.

name: Build and Push Catalog API Image

on:
  push:
    branches: [main]
  workflow_dispatch:            # allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.catalog
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/catalog-api:latest
            ghcr.io/${{ github.repository_owner }}/catalog-api:${{ github.sha }}
